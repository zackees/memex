name: Memex Build Index

on:
  workflow_call:
    inputs:
      repo:
        description: 'GitHub repo to index (owner/repo)'
        required: true
        type: string
      subdir:
        description: 'Subdirectory to index for files (e.g. "src"). Empty = whole repo.'
        required: false
        type: string
        default: ''
      fetch-depth:
        description: 'Git fetch depth for commit history'
        required: false
        type: number
        default: 500
  workflow_dispatch:
    inputs:
      repo:
        description: 'GitHub repo to index (owner/repo). Leave empty to index this repo.'
        required: false
        type: string
      subdir:
        description: 'Subdirectory to index for files (e.g. "src"). Empty = whole repo.'
        required: false
        type: string
      skip-issues:
        description: 'Skip indexing GitHub issues'
        type: boolean
        default: false
      skip-prs:
        description: 'Skip indexing GitHub PRs'
        type: boolean
        default: false
      skip-wiki:
        description: 'Skip indexing wiki'
        type: boolean
        default: false
      skip-commits:
        description: 'Skip indexing git commits'
        type: boolean
        default: false
      branch:
        description: 'Branch to index (default: main)'
        type: string
        default: 'main'

permissions:
  contents: read
  pages: write
  id-token: write
  issues: read
  pull-requests: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout memex action
        uses: actions/checkout@v4
        with:
          repository: zackees/memex
          path: memex

      - name: Determine target repo
        id: target
        run: |
          REPO="${{ inputs.repo || github.repository }}"
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "Target repo: ${REPO}"

      - name: Checkout target repo
        id: checkout-target
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.target.outputs.repo }}
          ref: ${{ inputs.branch || 'main' }}
          path: target
          fetch-depth: ${{ inputs.fetch-depth || 500 }}

      - name: Fallback - download repo zip
        if: steps.checkout-target.outcome == 'failure'
        run: |
          echo "Git checkout failed, falling back to zip download..."
          REPO="${{ steps.target.outputs.repo }}"
          BRANCH="${{ inputs.branch || 'main' }}"
          curl -sSL -o repo.zip "https://github.com/${REPO}/archive/refs/heads/${BRANCH}.zip"
          unzip -q repo.zip
          # The zip extracts to RepoName-branch/, move to target/
          mv *-"${BRANCH}" target
          echo "Fallback checkout complete"
          ls target/ | head -10

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXTRA_ARGS=""
          if [ -n "${{ inputs.subdir }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --subdir ${{ inputs.subdir }}"
          fi
          if [ "${{ inputs.skip-issues }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --no-issues"
          fi
          if [ "${{ inputs.skip-prs }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --no-prs"
          fi
          if [ "${{ inputs.skip-wiki }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --no-wiki"
          fi
          if [ "${{ inputs.skip-commits }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --no-commits"
          fi
          python memex/action/build_index.py \
            --repo "${{ steps.target.outputs.repo }}" \
            --repo-dir target \
            --output index.db \
            $EXTRA_ARGS

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp index.db _site/
          cp memex/pages/index.html _site/
          cp memex/pages/style.css _site/
          # Pre-built webpack bundles (sqlite-wasm-http with HTTP range requests)
          cp memex/pages/bundle.js _site/
          cp memex/pages/memex-*.js _site/
          cp memex/pages/*.wasm _site/
          # Also deploy dist/ bundles for downstream consumers
          cp -r memex/dist _site/dist
          echo "=== _site ==="
          find _site -type f | sort
          du -sh _site/*

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
