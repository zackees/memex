name: Memex Build Index

on:
  workflow_call:
    inputs:
      repo:
        description: 'GitHub repo to index (owner/repo)'
        required: true
        type: string
      branch:
        description: 'Branch to index (default: main)'
        required: false
        type: string
        default: 'main'
      fetch-depth:
        description: 'Git fetch depth for commit history'
        required: false
        type: number
        default: 5000
  workflow_dispatch:
    inputs:
      repo:
        description: 'GitHub repo to index (owner/repo). Leave empty to index this repo.'
        required: false
        type: string
      branch:
        description: 'Branch to index (default: main)'
        type: string
        default: 'main'

permissions:
  contents: write
  pages: write
  id-token: write
  issues: read
  pull-requests: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout memex action
        uses: actions/checkout@v4
        with:
          repository: zackees/memex
          path: memex
          fetch-depth: 0

      - name: Determine target repo
        id: target
        run: |
          REPO="${{ inputs.repo || github.repository }}"
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "Target repo: ${REPO}"

      - name: Checkout target repo
        id: checkout-target
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.target.outputs.repo }}
          ref: ${{ inputs.branch || 'main' }}
          path: target
          fetch-depth: ${{ inputs.fetch-depth || 5000 }}

      - name: Fallback - download repo zip
        if: steps.checkout-target.outcome == 'failure'
        run: |
          echo "Git checkout failed, falling back to zip download..."
          REPO="${{ steps.target.outputs.repo }}"
          BRANCH="${{ inputs.branch || 'main' }}"
          curl -sSL -o repo.zip "https://github.com/${REPO}/archive/refs/heads/${BRANCH}.zip"
          unzip -q repo.zip
          mv *-"${BRANCH}" target
          echo "Fallback checkout complete"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # --- Restore cached mirror DB ---
      - name: Restore mirror DB from cache
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: mirror.db
          key: memex-mirror-${{ steps.target.outputs.repo }}-${{ github.run_id }}
          restore-keys: |
            memex-mirror-${{ steps.target.outputs.repo }}-

      # --- Incremental sync: issues + PRs + commits ---
      - name: Sync issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd memex/action
          python index_issues.py \
            --repo "${{ steps.target.outputs.repo }}" \
            --db ../../mirror.db

      - name: Sync PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd memex/action
          python index_prs.py \
            --repo "${{ steps.target.outputs.repo }}" \
            --db ../../mirror.db

      - name: Sync commits
        run: |
          cd memex/action
          python index_commits.py \
            --repo-dir ../../target \
            --db ../../mirror.db \
            --limit 5000

      # --- Save mirror DB to cache ---
      - name: Save mirror DB to cache
        uses: actions/cache/save@v4
        with:
          path: mirror.db
          key: memex-mirror-${{ steps.target.outputs.repo }}-${{ github.run_id }}

      # --- Build presentation DB ---
      - name: Build presentation DB
        run: |
          cd memex/action
          python build_presentation.py \
            --mirror ../../mirror.db \
            --output ../../index.db \
            --repo "${{ steps.target.outputs.repo }}"

      # --- Checkpoint mirror to branch (non-fatal) ---
      - name: Checkpoint mirror DB
        continue-on-error: true
        run: |
          cd memex
          git config user.email "memex[bot]@users.noreply.github.com"
          git config user.name "memex[bot]"
          python action/checkpoint.py \
            --db ../mirror.db \
            --repo-dir . \
            --branch memex-data \
            --max 5

      # --- Prepare and deploy Pages ---
      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          # Rename to .sqlite to prevent CDN gzip (breaks range requests)
          cp index.db _site/index.sqlite
          # Use pages/ build (non-module, no import.meta.url issues)
          cp memex/pages/index.html _site/
          cp memex/pages/style.css _site/
          cp memex/pages/bundle.js _site/
          cp memex/pages/memex-*.js _site/
          cp memex/pages/sqlite3.wasm _site/
          cp -r memex/dist _site/dist
          echo "=== _site ==="
          find _site -type f | sort
          du -sh _site/*

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
